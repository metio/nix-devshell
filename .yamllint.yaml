extends: default
rules:
  # 160 is the style target, but embedded shell in CI scripts and long pinned
  # action values legitimately exceed it — warn rather than fail.
  line-length:
    max: 160
    level: warning
  document-start: disable
  comments:
    min-spaces-from-content: 1
  truthy:
    check-keys: false
